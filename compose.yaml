x-sail-platform: &sail-platform
    platform: '${SAIL_PLATFORM:-linux/amd64}'

x-queue-worker: &queue-worker
    <<: *sail-platform
    build:
        context: './vendor/laravel/sail/runtimes/8.5'
        dockerfile: Dockerfile
        platform: '${SAIL_PLATFORM:-linux/amd64}'
        args:
            WWWGROUP: '${WWWGROUP:-1000}'
    image: 'sail-8.5/app'
    extra_hosts:
        - 'host.docker.internal:host-gateway'
    environment:
        WWWUSER: '${WWWUSER:-1000}'
        LARAVEL_SAIL: 1
        XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
        XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
        IGNITION_LOCAL_SITES_PATH: '${PWD}'
        CACHE_STORE: redis
    volumes:
        - '.:/var/www/html'
    networks:
        - sail
    depends_on:
        pgsql:
            condition: service_healthy
        redis:
            condition: service_healthy
    restart: unless-stopped
    command: php artisan queue:work --sleep=3
    healthcheck:
        test:
            - CMD-SHELL
            - pgrep -f "artisan queue:work" >/dev/null || exit 1
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 15s

services:
    laravel.test:
        <<: *sail-platform
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            platform: '${SAIL_PLATFORM:-linux/amd64}'
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
    queue-worker-1:
        <<: *queue-worker
    queue-worker-2:
        <<: *queue-worker
    queue-worker-3:
        <<: *queue-worker
    queue-worker-4:
        <<: *queue-worker
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
